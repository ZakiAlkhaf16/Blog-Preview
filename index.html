<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main-card">
    <div class="content">
      <div class="top-desgin-card">
          <div class="centered-styles" id="left"></div>
          <div class="centered-styles" id="centered"></div>
          <div class="centered-styles" id="right"></div>
          <div class="centered-black-line"></div>
        <div  class="left-bottom-corner"></div>
        <div   class="right-bottom-corner"></div>
        <div class="white-line"></div>
      </div>
      <div class="main-content">
        <p class="learning">Learning</p>
        <p class="date">Published 21 Dec 2023</p>
        <h2 class="title">HTML & CSS foundations</h2>
        <p class="description">These languages are the backbone of 
          every website, defining structure, content, 
          and presentation.</p>
      </div>
      <div class="profile">
        <img src="./assets/images/image-avatar.webp" alt="avatar" class="avatar">
        <p class="name">Greg Hooper</p>
      </div>
    </div>
  </div>
</body>
</html>
